context:
  version: "4.1.1"

package:
  name: zitadel-client
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/z/zitadel-client/zitadel_client-${{ version }}.tar.gz
    sha256: fcf923655061699ff515e12849c1a4fd7a8d450a6f13ea00f81d0024d1f3e7a7

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - python !=3.9.0
    - python !=3.9.1
    - authlib <2.0.0,>=1.3.2
    - cryptography <45.0.0,>=44.0.1
    - pydantic >=2
    - python-dateutil >=2.8.2
    - requests <3.0.0,>=2.32.4
    - typing-extensions >=4.7.1
    - urllib3 <3.0.0,>=1.25.3

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - zitadel_client
        - zitadel_client.zitadel
        - zitadel_client.exceptions
      pip_check: true

about:
  summary: Official Zitadel SDK for Python. Authenticate and access Zitadel's authentication and management APIs in Python.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/zitadel/client-python
  homepage: https://zitadel.com/

extra:
  recipe-maintainers:
    - "0xbe7a"
